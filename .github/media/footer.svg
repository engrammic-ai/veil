<svg fill="none" viewBox="0 0 800 60" width="800" height="60" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .footer-container {
          font-family: 'JetBrains Mono', 'Fira Code', monospace;
          color: #fef3c7;
          display: flex;
