<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c2410c">
        <animate attributeName="stop-color" values="#c2410c;#ea580c;#c2410c" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#92400e">
        <animate attributeName="stop-color" values="#92400e;#c2410c;#92400e" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#78350f;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="banner-clip">
      <rect width="800" height="200" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#banner-clip)">
    <rect width="800" height="200" fill="url(#bg-grad)"/>

    <!-- Grid lines -->
    <g stroke="url(#grid-grad)" stroke-width="1">
      <line x1="0" y1="40" x2="800" y2="40" opacity="0.5"/>
      <line x1="0" y1="80" x2="800" y2="80" opacity="0.3"/>
      <line x1="0" y1="120" x2="800" y2="120" opacity="0.3"/>
      <line x1="0" y1="160" x2="800" y2="160" opacity="0.5"/>
      <line x1="100" y1="0" x2="100" y2="200" opacity="0.2"/>
      <line x1="200" y1="0" x2="200" y2="200" opacity="0.2"/>
      <line x1="600" y1="0" x2="600" y2="200" opacity="0.2"/>
      <line x1="700" y1="0" x2="700" y2="200" opacity="0.2"/>
    </g>

    <!-- Floating particles -->
    <circle cx="50" cy="30" r="2" fill="#fef3c7" opacity="0.6">
      <animate attributeName="cy" values="30;50;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="170" r="1.5" fill="#c2410c" opacity="0.5">
      <animate attributeName="cy" values="170;150;170" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="40" r="2" fill="#fef3c7" opacity="0.4">
      <animate attributeName="cy" values="40;60;40" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="160" r="1.5" fill="#92400e" opacity="0.4">
      <animate attributeName="cy" values="160;140;160" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Main title -->
    <text x="50" y="90" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="52" font-weight="700" letter-spacing="-0.02em">
      <tspan fill="url(#accent-grad)">V</tspan><tspan fill="#fef3c7">eil</tspan>
    </text>

    <!-- Tagline -->
    <text x="50" y="130" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="500" fill="url(#accent-grad)" letter-spacing="0.1em">
      STOP BABYSITTING YOUR CONTEXT.
    </text>

    <!-- Decorative line -->
    <line x1="50" y1="150" x2="380" y2="150" stroke="url(#accent-grad)" stroke-width="1" opacity="0.5">
      <animate attributeName="x2" values="50;380" dur="1s" fill="freeze"/>
    </line>

    <!-- Corner accents -->
    <path d="M0 0 L30 0 L0 30 Z" fill="url(#accent-grad)" opacity="0.15"/>
    <path d="M800 200 L770 200 L800 170 Z" fill="url(#accent-grad)" opacity="0.15"/>
  </g>
</svg>
