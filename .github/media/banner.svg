<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#6366f1;#a855f7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#a855f7;#6366f1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4c4c6d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4c4c6d;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="banner-clip">
      <rect width="800" height="200" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#banner-clip)">
    <rect width="800" height="200" fill="url(#bg-grad)"/>

    <!-- Grid lines -->
    <g stroke="url(#grid-grad)" stroke-width="1">
      <line x1="0" y1="40" x2="800" y2="40" opacity="0.5"/>
      <line x1="0" y1="80" x2="800" y2="80" opacity="0.3"/>
      <line x1="0" y1="120" x2="800" y2="120" opacity="0.3"/>
      <line x1="0" y1="160" x2="800" y2="160" opacity="0.5"/>
      <line x1="100" y1="0" x2="100" y2="200" opacity="0.2"/>
      <line x1="200" y1="0" x2="200" y2="200" opacity="0.2"/>
      <line x1="600" y1="0" x2="600" y2="200" opacity="0.2"/>
      <line x1="700" y1="0" x2="700" y2="200" opacity="0.2"/>
    </g>

    <!-- Floating particles -->
    <circle cx="50" cy="30" r="2" fill="#a855f7" opacity="0.6">
      <animate attributeName="cy" values="30;50;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="170" r="1.5" fill="#6366f1" opacity="0.5">
      <animate attributeName="cy" values="170;150;170" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="40" r="2" fill="#e0e7ff" opacity="0.4">
      <animate attributeName="cy" values="40;60;40" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="160" r="1.5" fill="#a855f7" opacity="0.4">
      <animate attributeName="cy" values="160;140;160" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Main title -->
    <text x="50" y="85" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="48" font-weight="700" letter-spacing="-0.02em">
      <tspan fill="url(#accent-grad)">V</tspan><tspan fill="#e0e7ff">eil</tspan>
    </text>

    <!-- Cycling taglines -->
    <text x="50" y="120" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="500" fill="url(#accent-grad)" letter-spacing="0.1em">
      AUTONOMIC CONTEXT FOR AI AGENTS.
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="50" y="120" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="500" fill="url(#accent-grad)" letter-spacing="0.1em">
      CONTEXT THAT GOVERNS ITSELF.
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite"/>
    </text>

    <!-- Decorative line -->
    <line x1="50" y1="140" x2="320" y2="140" stroke="url(#accent-grad)" stroke-width="1" opacity="0.5">
      <animate attributeName="x2" values="50;320" dur="1s" fill="freeze"/>
    </line>

    <!-- Tech tags -->
    <g font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#a855f7">
      <text x="50" y="165">aimd</text>
      <text x="100" y="165">sqlite-vec</text>
      <text x="190" y="165">fsrs</text>
      <text x="235" y="165">local-first</text>
      <text x="320" y="165">pi-fork</text>
    </g>

    <!-- Corner accents -->
    <path d="M0 0 L30 0 L0 30 Z" fill="url(#accent-grad)" opacity="0.15"/>
    <path d="M800 200 L770 200 L800 170 Z" fill="url(#accent-grad)" opacity="0.15"/>
  </g>
</svg>
