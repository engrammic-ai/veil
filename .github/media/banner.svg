<svg fill="none" viewBox="0 0 800 120" width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .banner-container {
          font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 120px;
          gap: 12px;
        }
        .title {
          font-size: 42px;
          font-weight: 700;
          letter-spacing: -0.02em;
          color: #fef3c7;
        }
        .title span {
          color: #c2410c;
        }
        .tagline-row {
          display: flex;
          align-items: center;
          width: 100%;
          max-width: 600px;
        }
        .tagline {
          font-size: 12px;
          letter-spacing: 0.3em;
          text-transform: uppercase;
          color: #c2410c;
          white-space: nowrap;
          padding: 0 20px;
        }
        .line {
          height: 1px;
          background: linear-gradient(90deg, transparent, #92400e, #c2410c, transparent);
          flex-grow: 1;
        }

        @media (prefers-color-scheme: light) {
          .title { color: #1c1917; }
          .title span { color: #c2410c; }
          .tagline { color: #92400e; }
          .line { background: linear-gradient(90deg, transparent, #c2410c, #92400e, transparent); }
        }
      </style>
      <div class="banner-container">
        <div class="title"><span>V</span>eil</div>
        <div class="tagline-row">
          <div class="line"></div>
          <div class="tagline">Stop Babysitting Your Context</div>
          <div class="line"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
