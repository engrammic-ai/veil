name: Release Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: installer/go.sum

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build all platforms
        run: just release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-binaries
          path: |
            installer/dist/veil-installer-*
            installer/dist/checksums.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer-binaries
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "installer-v${{ inputs.version }}" \
            --title "Installer v${{ inputs.version }}" \
            --notes "Veil installer release v${{ inputs.version }}" \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            dist/*
