name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install cross-platform clipboard bindings
        run: |
          CLIPBOARD_VERSION=$(node -p "require('./packages/coding-agent/package.json').optionalDependencies['@mariozechner/clipboard']")
          npm install --include=optional --no-save --package-lock=false --force --ignore-scripts \
            @mariozechner/clipboard@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-darwin-arm64@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-darwin-x64@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-linux-x64-gnu@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-linux-arm64-gnu@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-win32-x64-msvc@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-win32-arm64-msvc@"$CLIPBOARD_VERSION"

      - name: Build packages
        run: npm run build

      - name: Build release binaries and archives
        env:
          VEIL_VERSION: ${{ inputs.version }}
        run: ./scripts/build-release.sh

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: installer/go.sum

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build installer binaries
        working-directory: installer
        run: just release

      - name: Merge installer binaries
        run: |
          cp installer/dist/veil-installer-* packages/coding-agent/binaries/
          cd packages/coding-agent/binaries
          sha256sum veil-installer-* >> checksums.sha256

      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/241570418660/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: gha-deployer@engrammic.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish to GCS
        env:
          VEIL_VERSION: ${{ inputs.version }}
          VEIL_CHANNEL: ${{ inputs.prerelease && 'beta' || 'stable' }}
        run: ./scripts/publish-gcs.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            veil-*.tar.gz veil-*.zip veil-installer-* checksums.sha256
